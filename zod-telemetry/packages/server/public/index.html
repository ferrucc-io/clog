<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>zod-telemetry</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0f1117;
      --surface:  #1a1d27;
      --surface2: #22263a;
      --border:   #2e3250;
      --accent:   #6366f1;
      --accent-h: #818cf8;
      --red:      #f87171;
      --green:    #4ade80;
      --yellow:   #fbbf24;
      --text:     #e2e8f0;
      --muted:    #64748b;
      --code-bg:  #141720;
      --radius:   8px;
      --font-mono: "JetBrains Mono", "Fira Code", "Cascadia Code", ui-monospace, monospace;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* ── Sidebar ─────────────────────────────────────────────────── */
    #sidebar {
      width: 280px;
      min-width: 280px;
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #sidebar-header {
      padding: 18px 16px 14px;
      border-bottom: 1px solid var(--border);
    }

    #sidebar-header h1 {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: -0.3px;
      color: var(--text);
    }

    #sidebar-header p {
      font-size: 11px;
      color: var(--muted);
      margin-top: 3px;
    }

    #schema-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px 0;
    }

    .schema-item {
      padding: 10px 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 10px;
      border-left: 3px solid transparent;
      transition: background 0.1s;
    }

    .schema-item:hover { background: var(--surface); }
    .schema-item.active {
      background: var(--surface);
      border-left-color: var(--accent);
    }

    .schema-item .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--red);
      flex-shrink: 0;
    }

    .schema-item .info { flex: 1; min-width: 0; }

    .schema-item .name {
      font-size: 13px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .schema-item .meta {
      font-size: 11px;
      color: var(--muted);
      margin-top: 2px;
    }

    .schema-item .badge {
      font-size: 11px;
      font-weight: 700;
      background: rgba(248,113,113,0.15);
      color: var(--red);
      border-radius: 20px;
      padding: 2px 8px;
      flex-shrink: 0;
    }

    #sidebar-footer {
      padding: 10px 16px;
      border-top: 1px solid var(--border);
    }

    #sidebar-footer button {
      width: 100%;
      padding: 7px 0;
      font-size: 12px;
      background: none;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--muted);
      cursor: pointer;
      transition: color 0.1s, border-color 0.1s;
    }
    #sidebar-footer button:hover { color: var(--red); border-color: var(--red); }

    /* ── Empty / loading states ──────────────────────────────────── */
    #empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      gap: 12px;
      color: var(--muted);
      padding: 40px;
      text-align: center;
    }

    #empty svg { opacity: 0.3; }

    #empty h2 { font-size: 15px; color: var(--text); opacity: 0.6; }
    #empty p  { font-size: 13px; line-height: 1.6; max-width: 340px; }

    #empty code {
      font-family: var(--font-mono);
      font-size: 12px;
      background: var(--surface);
      padding: 2px 6px;
      border-radius: 4px;
    }

    /* ── Detail panel ────────────────────────────────────────────── */
    #detail {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #detail-header {
      padding: 18px 24px 14px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 14px;
    }

    #detail-header h2 {
      font-size: 17px;
      font-weight: 700;
      flex: 1;
    }

    #detail-header .stats {
      font-size: 12px;
      color: var(--muted);
    }

    #detail-header .stats span { color: var(--red); font-weight: 700; }

    .btn {
      padding: 6px 14px;
      font-size: 12px;
      border-radius: var(--radius);
      border: none;
      cursor: pointer;
      font-weight: 600;
      transition: opacity 0.1s;
    }
    .btn:hover { opacity: 0.85; }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-ghost {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
    }
    .btn-ghost:hover { color: var(--red); border-color: var(--red); }

    #detail-body {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    /* ── Cards ───────────────────────────────────────────────────── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .card-header {
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
      background: var(--surface2);
    }

    .card-header h3 {
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--muted);
    }

    .card-header .copy-btn {
      font-size: 11px;
      padding: 3px 10px;
      border-radius: 4px;
      border: 1px solid var(--border);
      background: none;
      color: var(--muted);
      cursor: pointer;
      transition: color 0.1s, border-color 0.1s;
    }
    .card-header .copy-btn:hover { color: var(--green); border-color: var(--green); }
    .card-header .copy-btn.copied { color: var(--green); border-color: var(--green); }

    /* ── Code block ──────────────────────────────────────────────── */
    .code-block {
      background: var(--code-bg);
      padding: 16px;
      font-family: var(--font-mono);
      font-size: 12.5px;
      line-height: 1.7;
      white-space: pre;
      overflow-x: auto;
      color: #c9d1d9;
    }

    /* Basic syntax colouring (applied via JS) */
    .tok-kw   { color: #c084fc; }   /* z.string, z.object … */
    .tok-key  { color: #7dd3fc; }   /* object keys */
    .tok-str  { color: #86efac; }   /* string literals */
    .tok-num  { color: #fbbf24; }   /* numbers */
    .tok-op   { color: #94a3b8; }   /* punctuation */

    /* ── Failure list ────────────────────────────────────────────── */
    .failure-list {
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .failure-item {
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .failure-item:last-child { border-bottom: none; }

    .failure-meta {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .failure-meta .ts {
      font-size: 11px;
      color: var(--muted);
    }

    .failure-meta .err-count {
      font-size: 11px;
      background: rgba(248,113,113,0.12);
      color: var(--red);
      padding: 1px 7px;
      border-radius: 20px;
    }

    .failure-input {
      font-family: var(--font-mono);
      font-size: 11.5px;
      background: var(--code-bg);
      padding: 8px 10px;
      border-radius: 5px;
      white-space: pre-wrap;
      word-break: break-all;
      color: #c9d1d9;
      max-height: 160px;
      overflow-y: auto;
    }

    .failure-errors {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .failure-error {
      font-size: 11.5px;
      display: flex;
      gap: 6px;
      align-items: flex-start;
    }

    .failure-error .path {
      font-family: var(--font-mono);
      color: var(--yellow);
      flex-shrink: 0;
    }

    .failure-error .msg { color: var(--red); }

    /* ── Scrollbar ───────────────────────────────────────────────── */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* ── Refresh indicator ───────────────────────────────────────── */
    #refresh-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--green);
      display: inline-block;
      margin-right: 6px;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }
  </style>
</head>
<body>

<!-- ── Sidebar ────────────────────────────────────────────────────────── -->
<aside id="sidebar">
  <div id="sidebar-header">
    <h1><span id="refresh-dot"></span>zod-telemetry</h1>
    <p>Validation failure explorer</p>
  </div>
  <div id="schema-list">
    <!-- populated by JS -->
  </div>
  <div id="sidebar-footer">
    <button id="clear-all-btn">Clear all data</button>
  </div>
</aside>

<!-- ── Main area ──────────────────────────────────────────────────────── -->
<main id="detail">
  <div id="empty">
    <svg width="48" height="48" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.2">
      <path stroke-linecap="round" stroke-linejoin="round"
        d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
    </svg>
    <h2>No schemas yet</h2>
    <p>
      Add <code>@zod-telemetry/client</code> to your app and wrap your Zod schemas.
      Validation failures will appear here in real time.
    </p>
    <p style="margin-top:8px;font-size:12px;">
      Server is listening on <code>POST /report</code>
    </p>
  </div>
</main>

<script>
// ---------------------------------------------------------------------------
// State
// ---------------------------------------------------------------------------
let schemas = [];
let activeSchema = null;
let pollInterval = null;

// ---------------------------------------------------------------------------
// Fetch helpers
// ---------------------------------------------------------------------------
async function fetchSchemas() {
  const r = await fetch('/api/schemas');
  return r.json();
}

async function fetchSchema(name) {
  const r = await fetch(`/api/schemas/${encodeURIComponent(name)}`);
  return r.json();
}

async function deleteSchema(name) {
  await fetch(`/api/schemas/${encodeURIComponent(name)}`, { method: 'DELETE' });
}

async function deleteAll() {
  await fetch('/api/schemas', { method: 'DELETE' });
}

// ---------------------------------------------------------------------------
// Rendering helpers
// ---------------------------------------------------------------------------
function relativeTime(ts) {
  const diff = Math.floor((Date.now() - new Date(ts).getTime()) / 1000);
  if (diff < 5)   return 'just now';
  if (diff < 60)  return `${diff}s ago`;
  if (diff < 3600) return `${Math.floor(diff/60)}m ago`;
  if (diff < 86400) return `${Math.floor(diff/3600)}h ago`;
  return `${Math.floor(diff/86400)}d ago`;
}

function escapeHtml(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

/**
 * Very lightweight syntax highlighting for Zod schema strings.
 * We just highlight the z.xxx() calls, keys, and punctuation.
 */
function highlightZod(code) {
  // Escape first
  let s = escapeHtml(code);

  // z.method() → purple
  s = s.replace(/(z\.[a-zA-Z]+)(\()/g,
    '<span class="tok-kw">$1</span><span class="tok-op">$2</span>');

  // Object keys (word followed by colon)
  s = s.replace(/(\b[a-zA-Z_$][a-zA-Z0-9_$]*\b)(\s*:)/g,
    '<span class="tok-key">$1</span>$2');

  // Quoted keys
  s = s.replace(/(&quot;[^&]*?&quot;)(\s*:)/g,
    '<span class="tok-key">$1</span>$2');

  return s;
}

function formatJson(value) {
  try {
    return JSON.stringify(value, null, 2);
  } catch {
    return String(value);
  }
}

// ---------------------------------------------------------------------------
// Sidebar
// ---------------------------------------------------------------------------
function renderSidebar() {
  const list = document.getElementById('schema-list');

  if (schemas.length === 0) {
    list.innerHTML = '<div style="padding:20px 16px;font-size:12px;color:var(--muted);text-align:center;">Waiting for failures…</div>';
    return;
  }

  // Sort by last seen (newest first)
  const sorted = [...schemas].sort((a, b) =>
    new Date(b.lastSeen).getTime() - new Date(a.lastSeen).getTime()
  );

  list.innerHTML = sorted.map(s => `
    <div class="schema-item ${activeSchema === s.name ? 'active' : ''}"
         data-name="${escapeHtml(s.name)}">
      <div class="dot"></div>
      <div class="info">
        <div class="name">${escapeHtml(s.name)}</div>
        <div class="meta">Last seen ${relativeTime(s.lastSeen)}</div>
      </div>
      <div class="badge">${s.totalFailures}</div>
    </div>
  `).join('');

  list.querySelectorAll('.schema-item').forEach(el => {
    el.addEventListener('click', () => {
      const name = el.dataset.name;
      activeSchema = name;
      renderSidebar();
      loadDetail(name);
    });
  });
}

// ---------------------------------------------------------------------------
// Detail panel
// ---------------------------------------------------------------------------
function showEmpty() {
  const detail = document.getElementById('detail');
  detail.innerHTML = `
    <div id="empty">
      <svg width="48" height="48" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.2">
        <path stroke-linecap="round" stroke-linejoin="round"
          d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
      </svg>
      <h2>No schemas yet</h2>
      <p>
        Add <code>@zod-telemetry/client</code> to your app and wrap your Zod schemas.
        Validation failures will appear here in real time.
      </p>
      <p style="margin-top:8px;font-size:12px;">
        Server is listening on <code>POST /report</code>
      </p>
    </div>`;
}

async function loadDetail(name) {
  const schema = await fetchSchema(name);
  renderDetail(schema);
}

function renderDetail(schema) {
  const detail = document.getElementById('detail');

  const samplesHtml = schema.samples.length === 0
    ? '<div style="padding:16px;color:var(--muted);font-size:13px;">No samples yet.</div>'
    : schema.samples.slice().reverse().map(f => {
        const pathsAndMessages = (f.errors || []).map(e => {
          const pathStr = e.path && e.path.length > 0 ? e.path.join('.') : '(root)';
          return `<div class="failure-error">
            <span class="path">${escapeHtml(pathStr)}</span>
            <span class="msg">${escapeHtml(e.message)}</span>
          </div>`;
        }).join('');

        return `
          <div class="failure-item">
            <div class="failure-meta">
              <span class="ts">${relativeTime(f.timestamp)}</span>
              ${f.errors && f.errors.length > 0 ? `<span class="err-count">${f.errors.length} error${f.errors.length !== 1 ? 's' : ''}</span>` : ''}
            </div>
            <div class="failure-input">${escapeHtml(formatJson(f.input))}</div>
            ${f.errors && f.errors.length > 0 ? `<div class="failure-errors">${pathsAndMessages}</div>` : ''}
          </div>`;
      }).join('');

  detail.innerHTML = `
    <div id="detail-header">
      <h2>${escapeHtml(schema.name)}</h2>
      <div class="stats">
        <span>${schema.totalFailures}</span> failure${schema.totalFailures !== 1 ? 's' : ''}
        · since ${relativeTime(schema.firstSeen)}
      </div>
      <button class="btn btn-ghost" id="delete-schema-btn">Clear</button>
    </div>
    <div id="detail-body">

      <!-- Inferred schema -->
      <div class="card">
        <div class="card-header">
          <h3>Inferred Zod schema</h3>
          <button class="copy-btn" id="copy-schema-btn">Copy</button>
        </div>
        <div class="code-block" id="schema-code">${highlightZod(schema.inferredSchema)}</div>
      </div>

      <!-- Usage snippet -->
      <div class="card">
        <div class="card-header">
          <h3>How to use this schema</h3>
          <button class="copy-btn" id="copy-usage-btn">Copy</button>
        </div>
        <div class="code-block" id="usage-code">${highlightZod(buildUsageSnippet(schema.name, schema.inferredSchema))}</div>
      </div>

      <!-- Failures -->
      <div class="card">
        <div class="card-header">
          <h3>Recent failures (${schema.samples.length} shown of ${schema.totalFailures})</h3>
        </div>
        <div class="failure-list">${samplesHtml}</div>
      </div>

    </div>`;

  // Wire up buttons
  document.getElementById('delete-schema-btn').addEventListener('click', async () => {
    if (!confirm(`Clear all data for "${schema.name}"?`)) return;
    await deleteSchema(schema.name);
    activeSchema = null;
    await refresh();
    showEmpty();
  });

  const copySchemaBtn = document.getElementById('copy-schema-btn');
  copySchemaBtn.addEventListener('click', () => {
    navigator.clipboard.writeText(schema.inferredSchema).then(() => {
      copySchemaBtn.textContent = 'Copied!';
      copySchemaBtn.classList.add('copied');
      setTimeout(() => {
        copySchemaBtn.textContent = 'Copy';
        copySchemaBtn.classList.remove('copied');
      }, 1500);
    });
  });

  const copyUsageBtn = document.getElementById('copy-usage-btn');
  copyUsageBtn.addEventListener('click', () => {
    const raw = buildUsageSnippet(schema.name, schema.inferredSchema);
    navigator.clipboard.writeText(raw).then(() => {
      copyUsageBtn.textContent = 'Copied!';
      copyUsageBtn.classList.add('copied');
      setTimeout(() => {
        copyUsageBtn.textContent = 'Copy';
        copyUsageBtn.classList.remove('copied');
      }, 1500);
    });
  });
}

function buildUsageSnippet(name, inferredSchema) {
  const varName = name.charAt(0).toLowerCase() + name.slice(1) + 'Schema';
  return `import { z } from "zod";

// Replace your existing schema (or z.any()) with this:
const ${varName} = ${inferredSchema};

// TypeScript type derived from the schema:
type ${name} = z.infer<typeof ${varName}>;`;
}

// ---------------------------------------------------------------------------
// Polling & refresh
// ---------------------------------------------------------------------------
async function refresh() {
  const prev = schemas.map(s => s.name + ':' + s.totalFailures).join('|');
  schemas = await fetchSchemas();
  const next = schemas.map(s => s.name + ':' + s.totalFailures).join('|');

  renderSidebar();

  // If the active schema updated, refresh the detail panel
  if (activeSchema) {
    const found = schemas.find(s => s.name === activeSchema);
    if (found && prev !== next) {
      loadDetail(activeSchema);
    } else if (!found) {
      activeSchema = null;
      showEmpty();
    }
  } else if (schemas.length === 0) {
    showEmpty();
  }
}

// ---------------------------------------------------------------------------
// Boot
// ---------------------------------------------------------------------------
document.getElementById('clear-all-btn').addEventListener('click', async () => {
  if (schemas.length === 0) return;
  if (!confirm('Clear ALL telemetry data?')) return;
  await deleteAll();
  schemas = [];
  activeSchema = null;
  renderSidebar();
  showEmpty();
});

refresh();
pollInterval = setInterval(refresh, 3000);
</script>
</body>
</html>
